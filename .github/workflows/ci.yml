name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Node test dependencies
        shell: pwsh
        run: |
          npm ci --ignore-scripts
          Get-ChildItem -Path services, sites -Recurse -Filter package-lock.json |
            Where-Object { $_.FullName -notmatch '[\\/]node_modules[\\/]' } |
            ForEach-Object {
              npm ci --prefix $_.DirectoryName --ignore-scripts
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            }
      - name: Install Bannerbuilder dependencies
        run: python -m pip install --disable-pip-version-check -r services/bannerbuilder/requirements.txt
      - name: Run tests and repository checks
        run: npm run check
      - name: Check formatting
        run: npm run format:ci
