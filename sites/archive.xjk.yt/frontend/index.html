<!doctype html>
<html lang="en" data-tool-id="archive-hub">
  <head>
    <link rel="stylesheet" href="/shared/xjk-core/chrome-prepaint.css?v=2" data-xjk-chrome-prepaint />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>archive.xjk.yt</title>
    <meta name="description" content="Preserved games, releases, and snapshots." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Condensed:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/foundation.css?v=2" />
    <link rel="stylesheet" href="./styles/catalog.css?v=2" />
    <link rel="stylesheet" href="./styles/game-detail.css?v=2" />
    <link rel="stylesheet" href="./styles/footer-responsive.css?v=2" />
    <link rel="icon" href="favicon.svg?v=2" type="image/svg+xml" />
  </head>
  <body>
    <div class="backdrop" aria-hidden="true"></div>

    <header class="arc-topbar"></header>

    <main class="arc-main">
      <section class="arc-hero" aria-labelledby="arcTitle">
        <div class="hero-copy">
          <h1 id="arcTitle"><span class="hero-accent">archive</span>.xjk.yt</h1>
          <p>preserved games, releases, and snapshots</p>
        </div>
      </section>

      <section class="arc-filter" aria-label="Filter archive catalog">
        <label class="sr-only" for="search">Filter archive</label>
        <div class="arc-search">
          <span class="search-glyph" aria-hidden="true"></span>
          <input id="search" type="search" placeholder="Filter games, builds, snapshots..." autocomplete="off" />
          <kbd>/</kbd>
        </div>
      </section>

      <section class="arc-catalog" id="catalogView" aria-live="polite">
        <div id="catalog"></div>
      </section>

      <section class="arc-game-page" id="gamePage" hidden>
        <div id="gamePageContent"></div>
      </section>

      <footer class="foot">
        <span class="foot-mark">archive.xjk.yt</span>
        <p class="foot-note">
          Only host files you are allowed to distribute. This hub is meant for personal/team archiving and quick access.
        </p>
      </footer>
    </main>

    <script type="module" src="app.js?v=2"></script>
    <script type="module" src="/shared/xjk-core/sidenav-boot.js?v=2" data-xjk-sidenav="archive"></script>
    <script type="module" src="/shared/xjk-core/topbar-loader.js?v=2" data-xjk-topbar="archive"></script>
  </body>
</html>
