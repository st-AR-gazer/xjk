<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>xjk / club</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=20260228-redesign" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
</head>
<body>
  <!-- Backdrop -->
  <div class="backdrop" aria-hidden="true">
    <div class="dot-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <a class="corner-back" href="/">Back to Trackers</a>

  <main>
    <!-- Header -->
    <header class="header">
      <div class="header-brand">
        <span class="header-badge">Club Tracker</span>
        <h1 class="header-title">club.</h1>
        <p class="header-sub">
          Ingests club, campaign, and upload snapshots into the aggregator for cross-project reuse.
        </p>
        <div class="header-status" id="statusLine">Loading...</div>
      </div>

      <section class="stats-bar" aria-label="Tracker stats">
        <div class="stat">
          <span class="stat-value" id="stat-enabled">&mdash;</span>
          <span class="stat-label">Enabled</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="stat-ingest">&mdash;</span>
          <span class="stat-label">Last Ingest</span>
        </div>
      </section>
    </header>

    <!-- Dashboard Grid -->
    <section class="dashboard-grid">
      <!-- Ingest Snapshot -->
      <div class="panel-card">
        <div class="section-bar">
          <h2>Ingest Snapshot</h2>
        </div>

        <div class="field" style="margin-top: 0.7rem;">
          <span class="field-label">Snapshot JSON</span>
          <textarea id="snapshotJson" class="form-textarea"></textarea>
        </div>

        <div class="btn-row">
          <button id="ingestBtn" class="btn btn-green" type="button">Ingest Snapshot</button>
        </div>
      </div>

      <!-- Service Status -->
      <div class="panel-card">
        <div class="section-bar">
          <h2>Service Status</h2>
        </div>
        <pre id="statusJson" class="json-display" style="margin-top: 0.7rem;">{}</pre>
      </div>
    </section>

    <!-- Footer -->
    <footer class="foot">
      <span class="foot-mark">trackers.xjk.yt/club</span>
      <nav aria-label="Hub navigation">
        <a data-link="main" href="https://xjk.yt/">Main</a>
        <a data-link="trackers" href="https://trackers.xjk.yt/">Trackers</a>
        <a data-link="altered" href="https://altered.xjk.yt/">Altered</a>
        <a data-link="aggregator" href="https://aggregator.xjk.yt/">Aggregator</a>
      </nav>
    </footer>
  </main>

  <script src="app.js?v=20260228-redesign"></script>
</body>
</html>
