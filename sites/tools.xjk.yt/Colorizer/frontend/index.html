<!doctype html>
<html lang="en" data-tool-id="colorizer">
  <head>
    <link rel="stylesheet" href="/shared/xjk-core/chrome-prepaint.css?v=2" data-xjk-chrome-prepaint />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gradient Color Formatter · tools.xjk.yt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Condensed:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css?v=2" />
    <link rel="stylesheet" href="../shared/tool-howto.css?v=2" />
    <link rel="stylesheet" href="customColors.css?v=2" />
    <link rel="icon" href="/favicon.svg?v=2" type="image/svg+xml" />

    <meta property="og:title" content="TM Gradient Color Formatter" />
    <meta
      property="og:description"
      content="This is a color code formatter for Trackmania. Input two colors and some text and it creates a linear change for each letter."
    />
    <meta property="og:url" content="https://tools.xjk.yt/Colorizer/" />
  </head>

  <body>
    <canvas id="dotCanvas"></canvas>

    <div class="modal">
      <h1>Trackmania Gradient Color Code Formatter</h1>

      <div class="flex-container settings-area">
        <button id="toggleEscape">Include \</button>
        <button id="toggleOptionCard">Custom formatting</button>
        <button id="toggleColorCard">Custom colors</button>
        <button id="clearFormatter">Reset formatter</button>
      </div>

      <div class="flex-container input-area">
        <input type="text" id="inputString" placeholder="Enter your text" />
        <button id="colorizeButton" aria-label="Colorize">&#127912;</button>
      </div>

      <div class="flex-container output-area">
        <div id="outputString" class="text-field" style="margin-right: 10px">
          Your formatted text will appear here...
        </div>
        <button id="copyButton" aria-label="Copy to clipboard">&#128203;</button>
      </div>

      <div class="flex-container preview-area">
        <div id="previewString" class="text-field">Preview color text here</div>
      </div>
    </div>

    <div id="colorCard" class="color-card">
      <div class="color-card-content">
        <div style="display: flex; justify-content: space-between">
          <h2>Choose Colors</h2>
          <div style="display: flex; flex-direction: column; justify-content: center">
            <button id="closeColorCard" style="height: 40px">x</button>
          </div>
        </div>

        <div class="color-count-selector" style="padding-bottom: 8px">
          <h3>Number of Colors</h3>
          <div class="btn-group" id="colorCountSelector">
            <input type="radio" id="twoColors" name="colorCount" value="2" checked />
            <label for="twoColors" class="btn">2</label>
            <input type="radio" id="threeColors" name="colorCount" value="3" />
            <label for="threeColors" class="btn">3</label>
            <input type="radio" id="fourColors" name="colorCount" value="4" />
            <label for="fourColors" class="btn">4</label>
            <input type="radio" id="fiveColors" name="colorCount" value="5" />
            <label for="fiveColors" class="btn">5</label>
            <input type="radio" id="sixColors" name="colorCount" value="6" />
            <label for="sixColors" class="btn">6</label>
            <input type="radio" id="sevenColors" name="colorCount" value="7" />
            <label for="sevenColors" class="btn">7</label>
          </div>
        </div>

        <div id="colorPickers" style="padding-bottom: 8px"></div>

        <h3>Quick Actions</h3>
        <div class="flex-container settings-area">
          <button id="randomizeColorsButton">Randomize</button>
          <button id="setDefaultColorsButton">Default</button>
          <button id="togglePresets">Presets</button>
          <button id="swapColorValuesButton">Flipp</button>
        </div>

        <div id="presetsPanel" class="presets-panel">
          <h4>Seasons</h4>
          <div class="flex-container settings-area">
            <button class="preset-btn" data-preset-colors="#77DDCC,#FFEEAA">Spring</button>
            <button class="preset-btn" data-preset-colors="#FFFFBB,#FF77BB">Summer</button>
            <button class="preset-btn" data-preset-colors="#990011,#EE6611">Fall</button>
            <button class="preset-btn" data-preset-colors="#66CCFF,#FF0000">Winter</button>
          </div>

          <h4>Pride</h4>
          <div class="flex-container settings-area">
            <div class="settings-area">
              <button class="preset-btn" data-preset-colors="#E40303,#FF8C00,#FFED00,#008026,#24408E,#732982">
                Pride
              </button>
              <button class="preset-btn" data-preset-colors="#5BCEFA,#F5A9B8,#FFFFFF,#F5A9B8,#5BCEFA">Trans</button>
              <button class="preset-btn" data-preset-colors="#078D70,#26CEAA,#98E8C1,#FFFFFF,#7BADE2,#5049CC,#3D1A78">
                Gay men
              </button>
            </div>
            <div class="settings-area">
              <button class="preset-btn" data-preset-colors="#D60270,#D60270,#9B4F96,#0038A8,#0038A8">Bisexual</button>
              <button class="preset-btn" data-preset-colors="#FF218C,#FFD800,#21B1FF">Pansexual</button>
              <button class="preset-btn" data-preset-colors="#000000,#A3A3A3,#FFFFFF,#800080">Asexual</button>
            </div>
            <div class="settings-area">
              <button class="preset-btn" data-preset-colors="#FCF434,#FFFFFF,#9C59D1,#2C2C2C">Non-binary</button>
            </div>
          </div>

          <h4>Flags</h4>
          <div class="flex-container settings-area">
            <div class="settings-area">
              <button class="preset-btn" data-preset-colors="#BA0C2F,#FFFFFF,#00205B">Norway</button>
              <button class="preset-btn" data-preset-colors="#C8102E,#FFFFFF">Denmark</button>
              <button class="preset-btn" data-preset-colors="#006AA7,#FECC02">Sweden</button>
              <button class="preset-btn" data-preset-colors="#FFFFFF,#002F6C">Finland</button>
            </div>

            <div class="settings-area">
              <button class="preset-btn" data-preset-colors="#001489,#FFDD00">European Union</button>
              <button class="preset-btn" data-preset-colors="#FF0000,#FFFFFF,#0000FF">United States</button>
              <button class="preset-btn" data-preset-colors="#002654,#FFFFFF,#ED2939">France</button>
              <button class="preset-btn" data-preset-colors="#FFFFFF,#C8102E,#012169">United Kingdom</button>
            </div>

            <div class="settings-area">
              <button class="preset-btn" data-preset-colors="#000000,#DD0000,#FFCC00">Germany</button>
              <button class="preset-btn" data-preset-colors="#2D2926,#FFCD00,#C8102E">Belgium</button>
              <button class="preset-btn" data-preset-colors="#C8102E,#FFFFFF,#003DA5">Netherlands</button>
              <button class="preset-btn" data-preset-colors="#EA141D,#FFFFFF,#51ADDA">Luxembourg</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="optionsCard" class="options-card">
      <div class="option-card-content">
        <div style="display: flex; justify-content: space-between">
          <h2>Custom Formatting Options</h2>
          <div style="display: flex; flex-direction: column; justify-content: center">
            <button id="closeOptionsCard" style="height: 40px">x</button>
          </div>
        </div>
        <div class="btn-group">
          <input type="radio" id="directApply" name="interpolation" value="DirectApply" />
          <label for="directApply" class="btn">Direct Apply</label>

          <input type="radio" id="linear" name="interpolation" value="Linear" checked />
          <label for="linear" class="btn">Linear</label>

          <input type="radio" id="quadratic" name="interpolation" value="Quadratic" />
          <label for="quadratic" class="btn">Quadratic</label>

          <input type="radio" id="cubic" name="interpolation" value="Cubic" />
          <label for="cubic" class="btn">Cubic</label>

          <input type="radio" id="quartic" name="interpolation" value="Quartic" />
          <label for="quartic" class="btn">Quartic</label>

          <input type="radio" id="quintic" name="interpolation" value="Quintic" />
          <label for="quintic" class="btn">Quintic</label>

          <input type="radio" id="sine" name="interpolation" value="Sine" />
          <label for="sine" class="btn">Sine</label>

          <input type="radio" id="back" name="interpolation" value="Back" />
          <label for="back" class="btn">Back</label>

          <input type="radio" id="elastic" name="interpolation" value="Elastic" />
          <label for="elastic" class="btn">Elastic</label>

          <input type="radio" id="bounce" name="interpolation" value="Bounce" />
          <label for="bounce" class="btn">Bounce</label>

          <input type="radio" id="smoothstep" name="interpolation" value="Smoothstep" />
          <label for="smoothstep" class="btn">Smoothstep</label>

          <input type="radio" id="smootherstep" name="interpolation" value="Smootherstep" />
          <label for="smootherstep" class="btn">Smootherstep</label>

          <input type="radio" id="circular" name="interpolation" value="Circular" />
          <label for="circular" class="btn">Circular</label>

          <input type="radio" id="exponential" name="interpolation" value="Exponential" />
          <label for="exponential" class="btn">Exponential</label>

          <input type="radio" id="sinusoidal" name="interpolation" value="Sinusoidal" />
          <label for="sinusoidal" class="btn">Sinusoidal</label>
        </div>
      </div>
    </div>

    <div id="notificationContainer" class="notification-container"></div>

    <script src="/shared/xjk-core/safe-html.js?v=2"></script>
    <script src="../shared/tool-browser-runtime.js?v=2"></script>
    <script src="../shared/tool-theme.js?v=2"></script>
    <script type="module" src="mainCard.js?v=2"></script>
    <script
      type="module"
      src="/shared/xjk-core/sidenav-boot.js?v=2"
      data-xjk-sidenav="tools"
      data-xjk-page="tool"
    ></script>
    <script
      type="module"
      src="/shared/xjk-core/topbar-loader.js?v=2"
      data-xjk-topbar="tools"
      data-xjk-page="tool"
    ></script>
  </body>
</html>
