<!doctype html>
<html lang="en" data-tool-id="ghost-embedder">
  <head>
    <link rel="stylesheet" href="/shared/xjk-core/chrome-prepaint.css?v=2" data-xjk-chrome-prepaint />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ghost Embedder · tools.xjk.yt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Condensed:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/shared/xjk-core/surface-foundation.css?v=2" />
    <link rel="stylesheet" href="../shared/tool-theme/foundation.css?v=2" />
    <link rel="stylesheet" href="../shared/tool-theme/uploads.css?v=2" />
    <link rel="stylesheet" href="../shared/tool-theme/controls.css?v=2" />
    <link rel="stylesheet" href="../shared/tool-theme/candidates.css?v=2" />
    <link rel="stylesheet" href="../shared/tool-theme/documentation.css?v=2" />
    <link rel="stylesheet" href="../shared/tool-howto.css?v=2" />
    <link rel="stylesheet" href="styles.css?v=2" />
    <link rel="icon" href="/favicon.svg?v=2" type="image/svg+xml" />
  </head>
  <body>
    <div class="backdrop" aria-hidden="true"></div>

    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Validation Utility</p>
        <h1>Embed Validation Ghost / Replay Ghost</h1>
      </section>

      <section class="cards" aria-label="Upload inputs">
        <article id="mapDrop" class="dropcard" tabindex="0" aria-label="Map upload">
          <input id="mapFile" type="file" accept=".gbx,.Map.Gbx" />
          <p class="card-title">Map Input</p>
          <p class="card-copy">Drop <code>.Map.Gbx</code> here or click to browse.</p>
          <p id="mapName" class="card-meta">No map selected</p>
        </article>

        <article id="sourceDrop" class="dropcard" tabindex="0" aria-label="Ghost or replay upload">
          <input id="sourceFile" type="file" accept=".gbx,.Ghost.Gbx,.Replay.Gbx" />
          <p class="card-title">Ghost / Replay Source</p>
          <p class="card-copy">Drop <code>.Ghost.Gbx</code> or <code>.Replay.Gbx</code> here.</p>
          <p id="sourceName" class="card-meta">No source selected</p>
        </article>
      </section>

      <section id="replayPanel" class="replay-panel hidden" aria-label="Replay metadata and ghost selection">
        <h2>Replay Metadata</h2>
        <div id="replaySummary" class="summary-grid"></div>
        <h3>Select Ghost Index To Embed</h3>
        <div id="ghostList" class="ghost-grid"></div>
      </section>

      <section class="meta-row">
        <button id="go" class="go" disabled>Upload And Embed Selected Ghost</button>
      </section>

      <div id="status" class="status" role="status" aria-live="polite"></div>
      <div id="error" class="error" role="alert"></div>
    </main>

    <div id="overlay" class="overlay hidden" aria-live="polite" aria-busy="true">
      <div class="loader" aria-hidden="true"></div>
      <p id="overlayText" class="overlay-title">Uploading...</p>
      <p id="progressText" class="overlay-copy"></p>
    </div>

    <script src="../shared/tool-browser-runtime.js?v=2"></script>
    <script src="../shared/tool-theme.js?v=2"></script>
    <script type="module" src="app.js?v=2"></script>
    <script
      type="module"
      src="/shared/xjk-core/sidenav-boot.js?v=2"
      data-xjk-sidenav="tools"
      data-xjk-page="tool"
    ></script>
    <script
      type="module"
      src="/shared/xjk-core/topbar-loader.js?v=2"
      data-xjk-topbar="tools"
      data-xjk-page="tool"
    ></script>
  </body>
</html>
