<!doctype html>
<html lang="en" data-tool-id="medal-time-modifier">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>xjk / tools / medal time modifier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="../../shared/tool-theme.css" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-sweep bg-sweep-warm" aria-hidden="true"></div>
  <div class="bg-sweep bg-sweep-cool" aria-hidden="true"></div>

  <main class="shell">
    <section class="hero">
      <p class="eyebrow">Map Utility</p>
      <h1>GBX Medal Time Modifier</h1>
      <p class="lead">Upload one map and set medal times. Use <code>auto</code> for Gold/Silver/Bronze and <code>_</code> to keep a medal unchanged.</p>
    </section>

    <section class="cards" aria-label="Inputs">
      <article id="mapDrop" class="dropcard" tabindex="0" aria-label="Map upload">
        <input id="mapFile" type="file" accept=".gbx,.Map.Gbx" />
        <p class="card-title">Map Input</p>
        <p class="card-copy">Drop <code>.Map.Gbx</code> here or click to browse.</p>
        <p id="mapName" class="card-meta">No map selected</p>
      </article>
    </section>

    <section class="panel" aria-label="Medal values">
      <h2>Medal Targets</h2>
      <div class="field-grid medals">
        <label class="field">
          <span>Author Time (AT)</span>
          <input id="at" type="text" value="60000" />
          <small>Required. Number or <code>_</code>. <code>auto</code> is not valid for AT.</small>
        </label>
        <label class="field">
          <span>Gold</span>
          <input id="gold" type="text" value="auto" />
          <small>Number, <code>_</code>, or <code>auto</code>.</small>
        </label>
        <label class="field">
          <span>Silver</span>
          <input id="silver" type="text" value="auto" />
          <small>Number, <code>_</code>, or <code>auto</code>.</small>
        </label>
        <label class="field">
          <span>Bronze</span>
          <input id="bronze" type="text" value="_" />
          <small>Number, <code>_</code>, or <code>auto</code>.</small>
        </label>
      </div>
    </section>

    <section class="actions">
      <button id="go" class="go" disabled>Modify Medal Times</button>
    </section>

    <div id="status" class="status" role="status" aria-live="polite"></div>
    <div id="error" class="error" role="alert"></div>
  </main>

  <div id="overlay" class="overlay hidden" aria-live="polite" aria-busy="true">
    <div class="loader" aria-hidden="true"></div>
    <p id="overlayText" class="overlay-title">Working...</p>
    <p id="progressText" class="overlay-copy"></p>
  </div>

  <script src="../../shared/tool-theme.js"></script>
  <script src="app.js"></script>
</body>
</html>
