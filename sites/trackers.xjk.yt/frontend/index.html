<!doctype html>
<html lang="en">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com" />

<body>
  <div class="app-shell">
    <aside class="shell-sidebar">
      <div class="shell-brand">
        <span class="shell-badge">Tracker Group</span>

      <nav class="shell-nav" aria-label="Tracker Navigation">
        <div class="shell-nav-label">Overview</div>
        <a class="shell-link" data-route="overview" data-route-link href="/">

        </a>

        <div class="shell-nav-label shell-nav-label--spaced">Runtimes</div>
        <a class="shell-link" data-route="wr" data-route-link href="/wr/">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          <span>WR Tracker</span>
        </a>
        <a class="shell-link" data-route="leaderboard" data-route-link href="/leaderboard/">

          <span>Displayname</span>
        </a>
        <a class="shell-link" data-route="club" data-route-link href="/club/">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>

        </a>
      </nav>

      <footer class="shell-footer">
        <div class="shell-nav-label shell-nav-label--footer">Network Hubs</div>
        <a class="shell-footer-link" data-link="main" href="https://xjk.yt/" rel="noopener noreferrer">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>

      <noscript>
        <div class="route-boot">Tracker shell needs JavaScript enabled to switch between runtime tabs.</div>
      </noscript>
      <div id="route-content" class="route-outlet">
        <div class="route-boot">Loading tracker shell...</div>
      </div>
    </main>
  </div>

  <script src="/trackers-shell/app.js?v=20260419-shell-toolbarless"></script>
</body>
</html>
