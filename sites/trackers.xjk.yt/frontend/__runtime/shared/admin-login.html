<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="/shared/xjk-core/chrome-prepaint.css?v=2" data-xjk-chrome-prepaint />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>xjk / tracker / admin login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Manrope:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/shared/main.css?v=2" />
    <link rel="stylesheet" href="../styles.css?v=2" />
    <link rel="stylesheet" href="../tracker-shared/admin.css?v=2" />
    <link rel="stylesheet" href="../tracker-shared/admin-login.css?v=2" />
    <link rel="icon" href="../tracker-shared/favicon.svg?v=2" type="image/svg+xml" />
  </head>
  <body>
    <div class="backdrop" aria-hidden="true">
      <div class="dot-grid"></div>
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>

    <a class="corner-back" href="/">Back to Dashboard</a>

    <main class="login-shell">
      <section class="panel login-panel">
        <header class="login-header">
          <span class="header-badge">Tracker Admin</span>
          <h1>Admin Login</h1>
          <p>Sign in with a configured tracker admin method.</p>
        </header>

        <p id="status-note" class="login-status">Checking authentication state...</p>

        <form id="login-form" class="login-form" autocomplete="on">
          <label id="login-username-field" class="field">
            <span>Username</span>
            <input id="login-username" name="username" type="text" autocomplete="username" required />
          </label>

          <label id="login-password-field" class="field">
            <span>Password</span>
            <input id="login-password" name="password" type="password" autocomplete="current-password" required />
          </label>

          <label id="login-token-field" class="field" hidden>
            <span>Admin token</span>
            <input id="login-token" name="adminToken" type="password" autocomplete="off" spellcheck="false" />
          </label>

          <button id="login-submit" class="btn-main" type="submit">Sign In</button>
        </form>

        <p id="hint-note" class="hint-note">Local auth is managed by tracker backend settings.</p>
      </section>
    </main>

    <script type="module" src="../admin-login.js?v=2"></script>
    <script
      type="module"
      src="/shared/xjk-core/sidenav-boot.js?v=2"
      data-xjk-sidenav="trackers"
      data-xjk-page="admin/login"
    ></script>
    <script
      type="module"
      src="/shared/xjk-core/topbar-loader.js?v=2"
      data-xjk-topbar="trackers"
      data-xjk-page="admin/login"
    ></script>
  </body>
</html>
