<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>xjk / club</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Manrope:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/shared/main.css?v=2" />
    <link rel="stylesheet" href="styles.css?v=2" />
    <link rel="icon" href="/favicon.svg?v=2" type="image/svg+xml" />
  </head>
  <body>
    <div class="command-center">
      <header class="command-header">
        <div>
          <h1 class="command-title">CLUB <span>TRACKER</span></h1>
          <div class="command-meta" id="statusLine">RUNTIME &mdash; LIVE</div>
        </div>
        <div style="display: flex; gap: 0.5rem">
          <a class="neon-btn is-solid" href="admin/login">Admin Console</a>
        </div>
      </header>

      <div class="chip-grid">
        <div class="data-chip" style="flex: 1">
          <span class="chip-label">Last Ingest</span>
          <span class="chip-value" id="stat-ingest" style="font-size: 1rem; color: var(--accent)">&mdash;</span>
        </div>
      </div>

      <div class="view-layer is-active" id="view-ingest">
        <div class="glass-panel" style="flex: 1">
          <h2 class="form-label" style="margin: 0 0 1rem 0">
            MANUAL SNAPSHOT INGEST <span class="status-flag is-warn">MANUAL</span>
          </h2>

          <div class="form-group" style="flex: 1; display: flex; flex-direction: column">
            <span class="form-label">SNAPSHOT JSON PAYLOAD</span>
            <textarea
              id="snapshotJson"
              class="form-textarea"
              spellcheck="false"
              style="flex: 1; max-height: none; font-family: var(--font-mono); font-size: 0.75rem; color: var(--ok)"
            ></textarea>
          </div>

          <div style="margin-top: 1rem">
            <button id="ingestBtn" class="neon-btn is-solid">EXECUTE INGEST</button>
          </div>
        </div>
      </div>

      <div class="view-layer" id="view-status">
        <div class="glass-panel" style="flex: 1; display: flex; flex-direction: column">
          <h2 class="form-label" style="margin: 0 0 1rem 0">RAW JSON INSPECTOR</h2>
          <pre id="statusJson" class="json-block" style="flex: 1; max-height: none">{}</pre>
        </div>
      </div>

      <nav class="dock-container">
        <button class="dock-btn is-active" data-view="ingest">&#x1F4BE; INGEST</button>
        <button class="dock-btn" data-view="status">&#x1F4DC; STATE</button>
      </nav>
    </div>

    <script type="module" src="app.js?v=2"></script>
  </body>
</html>
