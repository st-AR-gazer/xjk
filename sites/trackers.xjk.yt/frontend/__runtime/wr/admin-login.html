<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>xjk / wr / admin login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/shared/main.css?v=20260419-redesign" />
  <link rel="stylesheet" href="../styles.css?v=20260419-redesign" />
  <link rel="stylesheet" href="../admin.css?v=20260419-redesign" />
  <link rel="stylesheet" href="../admin-login.css?v=20260419-redesign" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
</head>
<body>
  <div class="backdrop" aria-hidden="true">
    <div class="dot-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <a class="corner-back" href="/">Back to Dashboard</a>

  <main class="login-shell">
    <section class="panel login-panel">
      <header class="login-header">
        <span class="header-badge">Tracker Admin</span>
        <h1>Admin Login</h1>
        <p>Sign in with your local tracker admin credentials.</p>
      </header>

      <p id="status-note" class="login-status">Checking authentication state...</p>

      <form id="login-form" class="login-form" autocomplete="on">
        <label class="field">
          <span>Username</span>
          <input id="login-username" name="username" type="text" autocomplete="username" required />
        </label>

        <label class="field">
          <span>Password</span>
          <input id="login-password" name="password" type="password" autocomplete="current-password" required />
        </label>

        <button id="login-submit" class="btn-main" type="submit">Sign In</button>
      </form>

      <p id="hint-note" class="hint-note">Local auth is managed by tracker backend settings.</p>
    </section>
  </main>

  <script src="../admin-login.js?v=20260419-redesign"></script>
</body>
</html>
