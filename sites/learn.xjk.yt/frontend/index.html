<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>learn.xjk.yt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --hub-main: #2cbfd0;
      --hub-main-soft: #56d9e4;
      --bg-0: #07121a;
      --bg-1: #0d1f2a;
      --ink: #e7f4fa;
      --muted: #9ab7c4;
      --card: #132834;
      --line: #275161;
      --accent: var(--hub-main);
      --accent-soft: var(--hub-main-soft);
      --glow: rgba(44, 191, 208, 0.25);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 90% -8%, rgba(44, 191, 208, 0.22) 0%, transparent 45%),
        linear-gradient(160deg, var(--bg-0), var(--bg-1));
    }

    main {
      width: min(1120px, 100% - 2rem);
      margin: 0 auto;
      padding: 2.8rem 0;
    }

    .tag {
      display: inline-block;
      padding: 0.3rem 0.6rem;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--muted);
      background: rgba(255, 255, 255, 0.04);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-family: "Chakra Petch", sans-serif;
    }

    h1 {
      margin: 0.9rem 0 0.6rem;
      font-size: clamp(1.9rem, 4vw, 2.8rem);
      font-family: "Chakra Petch", sans-serif;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .hero {
      margin-top: 1rem;
      position: relative;
      min-height: clamp(340px, 58vh, 620px);
      border: 1px solid var(--line);
      border-radius: 22px;
      background:
        radial-gradient(500px 240px at 80% 8%, var(--glow), transparent 70%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(0, 0, 0, 0.24));
      overflow: hidden;
      box-shadow: 0 24px 46px rgba(0, 0, 0, 0.35);
    }

    .hero-badge {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 2;
      padding: 0.45rem 0.75rem;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(10, 25, 34, 0.78);
      color: var(--accent-soft);
      font-family: "Chakra Petch", sans-serif;
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .hero svg {
      width: 100%;
      height: 100%;
      display: block;
      opacity: 0.98;
    }

    .hero-overlay {
      border: 1px solid var(--line);
      border-radius: 16px;
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 18px;
      z-index: 2;
      padding: 0.9rem 1rem;
      background: rgba(8, 19, 27, 0.82);
      backdrop-filter: blur(4px);
    }

    .hero-overlay strong {
      display: block;
      font-family: "Chakra Petch", sans-serif;
      letter-spacing: 0.02em;
      color: var(--ink);
      font-size: 1.04rem;
    }

    .hero-overlay span {
      display: block;
      color: var(--muted);
      margin-top: 0.2rem;
      font-size: 0.95rem;
    }

    .float-a {
      animation: drift-a 7s ease-in-out infinite;
      transform-origin: center;
    }

    .float-b {
      animation: drift-b 9s ease-in-out infinite;
      transform-origin: center;
    }

    .pulse {
      animation: pulse 1.8s ease-in-out infinite;
      transform-origin: center;
    }

    nav {
      margin-top: 1.4rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem;
    }

    a {
      text-decoration: none;
      color: var(--ink);
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 12px;
      padding: 0.55rem 0.8rem;
      font-weight: 600;
      font-family: "Chakra Petch", sans-serif;
      transition: border-color 140ms ease, transform 140ms ease;
    }

    a:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    @keyframes drift-a {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes drift-b {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-11px); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.45; }
      50% { opacity: 1; }
    }
  </style>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
</head>
<body>
  <main>
    <span class="tag">Learn Hub</span>
    <h1>learn.xjk.yt</h1>
    <p>Under construction.</p>

    <section class="hero" aria-label="Under construction graphic">
      <div class="hero-badge">Site Construction</div>
      <svg viewBox="0 0 1200 700" role="img" aria-label="Construction scene illustration">
        <defs>
          <linearGradient id="learnSky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#123042" />
            <stop offset="100%" stop-color="#0a1823" />
          </linearGradient>
          <linearGradient id="learnGround" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#123042" />
            <stop offset="100%" stop-color="#0f2633" />
          </linearGradient>
        </defs>

        <rect x="0" y="0" width="1200" height="700" fill="url(#learnSky)" />
        <rect x="0" y="430" width="1200" height="270" fill="url(#learnGround)" />

        <g opacity="0.18">
          <rect x="90" y="220" width="110" height="210" fill="#7ad8e5" />
          <rect x="240" y="180" width="160" height="250" fill="#7ad8e5" />
          <rect x="470" y="250" width="95" height="180" fill="#7ad8e5" />
          <rect x="610" y="160" width="130" height="270" fill="#7ad8e5" />
          <rect x="790" y="230" width="110" height="200" fill="#7ad8e5" />
          <rect x="940" y="170" width="150" height="260" fill="#7ad8e5" />
        </g>

        <g class="float-a">
          <rect x="160" y="120" width="16" height="380" fill="#5fd8e4" />
          <rect x="160" y="120" width="380" height="14" fill="#5fd8e4" />
          <line x1="470" y1="134" x2="470" y2="280" stroke="#5fd8e4" stroke-width="5" />
          <circle cx="470" cy="296" r="14" fill="#5fd8e4" class="pulse" />
        </g>

        <g class="float-b">
          <rect x="815" y="130" width="14" height="300" fill="#42c8d8" />
          <rect x="690" y="130" width="210" height="12" fill="#42c8d8" />
          <line x1="900" y1="140" x2="900" y2="250" stroke="#42c8d8" stroke-width="4" />
          <circle cx="900" cy="263" r="10" fill="#42c8d8" class="pulse" />
        </g>

        <g stroke="#6de1ed" stroke-width="3" fill="none" opacity="0.55">
          <rect x="280" y="330" width="260" height="170" />
          <line x1="280" y1="372" x2="540" y2="372" />
          <line x1="280" y1="414" x2="540" y2="414" />
          <line x1="280" y1="456" x2="540" y2="456" />
          <line x1="332" y1="330" x2="332" y2="500" />
          <line x1="384" y1="330" x2="384" y2="500" />
          <line x1="436" y1="330" x2="436" y2="500" />
          <line x1="488" y1="330" x2="488" y2="500" />
        </g>

        <g>
          <rect x="0" y="525" width="1200" height="22" fill="#1a3a4a" />
          <rect x="0" y="548" width="1200" height="22" fill="#43c9d9" />
          <rect x="0" y="571" width="1200" height="22" fill="#1a3a4a" />
        </g>

        <g transform="translate(940 500)">
          <polygon points="0,70 36,0 72,70" fill="#4ad0de" />
          <rect x="16" y="35" width="40" height="10" fill="#0d1f2a" />
        </g>
        <g transform="translate(1028 500)">
          <polygon points="0,70 36,0 72,70" fill="#4ad0de" />
          <rect x="16" y="35" width="40" height="10" fill="#0d1f2a" />
        </g>
      </svg>
      <div class="hero-overlay">
        <strong>Learn Hub Is Being Built</strong>
        <span>Major sections, tutorials, and content pipelines are currently in active construction.</span>
      </div>
    </section>

    <nav aria-label="Hub navigation">
      <a data-link="main" href="https://xjk.yt/">Main Hub</a>
      <a data-link="tools" href="https://tools.xjk.yt/">Tools Hub</a>
      <a data-link="plugins" href="https://plugins.xjk.yt/">Plugins Hub</a>
      <a data-link="altered" href="https://altered.xjk.yt/">Altered Hub</a>
    </nav>
  </main>
  <script>
    (function configureLinks() {
      const host = window.location.hostname.toLowerCase();
      const port = window.location.port || "80";
      const isPathMode = host === "localhost" || host === "127.0.0.1" || host === "xjk.localhost";
      const isLocalSubdomain = host.endsWith(".localhost");
      const isLocalMode = isPathMode || isLocalSubdomain;

      const links = {
        main: "https://xjk.yt/",
        tools: "https://tools.xjk.yt/",
        plugins: "https://plugins.xjk.yt/",
        altered: "https://altered.xjk.yt/",
      };

      if (isLocalMode) {
        links.main = `http://xjk.localhost:${port}/`;
        links.tools = `http://tools.localhost:${port}/`;
        links.plugins = `http://plugins.localhost:${port}/`;
        links.altered = `http://altered.localhost:${port}/`;
      }

      document.querySelectorAll("[data-link]").forEach((el) => {
        const key = el.getAttribute("data-link");
        if (links[key]) el.setAttribute("href", links[key]);
      });
    })();
  </script>
</body>
</html>
