<!doctype html>
<html lang="en">
  <head>
    <link
      rel="stylesheet"
      href="/shared/xjk-core/chrome-prepaint.css?v=2"
      data-xjk-chrome-prepaint
    />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Altered Nadeo - Banner Builder</title>

    <link rel="icon" href="../favicon.svg?v=2" type="image/svg+xml" />

    <link rel="stylesheet" href="static/css/style.css?v=2" />
    <link rel="stylesheet" href="static/css/history.css?v=2" />
    <link rel="stylesheet" href="static/css/modal.css?v=2" />
  </head>

  <body
    data-dashmap-enabled="{{ 'true' if dashmap.enabled else 'false' }}"
    data-dashmap-message="{{ dashmap.message }}"
  >
    <div class="layout">
      <section id="builder-card" class="card">
        <h1>Banner builder</h1>
        <form id="banner-form" class="header-row">
          <label class="field">
            <span>Main time</span>
            <div class="input-wrap">
              <input name="main" value="1:23:45.678" required />
              <button type="button" id="edit-main-btn" class="btn-light">&#9881;</button>
            </div>
          </label>

          <label class="field">
            <span>Secondary</span>
            <div class="input-wrap">
              <input name="sub" placeholder="ft' ar" />
              <button type="button" id="edit-sub-btn" class="btn-light">&#9881;</button>
            </div>
          </label>

          <label class="field">
            <span>Background</span>
            <select name="bg">
              {% for option in background_options %}
              <option value="{{ option.value }}" {% if option.value == default_background %}selected{% endif %}>{{ option.label }}</option>
              {% endfor %}
            </select>
          </label>
        </form>

        <div class="solids-header">
          <h2>Solids</h2>
          <button id="reset-btn" type="button" class="btn-reset">Reset</button>
        </div>

        <div id="solids-top" class="solids-row five-boxes"></div>
        <div id="solids-bottom" class="solids-row four-boxes"></div>

        <button id="generate-btn" class="btn-primary" type="button">Generate</button>
      </section>

      <aside id="editor-panel">
        <header>
          <h3 id="editor-title"></h3>
          <button id="close-editor" type="button">&times;</button>
        </header>
        <form id="editor-form"></form>
      </aside>
    </div>

    <section class="preview">
      <div class="preview-header">
        <h2>Preview</h2>
        <button id="download-btn" class="btn-primary preview-action" type="button">Download image</button>
        <button id="dashmap-btn" class="btn-primary" type="button">Dashmap URL</button>
        {% if not dashmap.enabled %}
        <span class="preview-note">{{ dashmap.message }}</span>
        {% endif %}
      </div>

      <img id="preview-img" alt="Your banner will appear here" />
    </section>

    <script src="static/js/main.js?v=2"></script>
    <script defer src="/shared/xjk-core/safe-html.js?v=2"></script>
    <script defer src="static/js/history.js?v=2"></script>
    <script defer src="static/js/modal.js?v=2"></script>
    <script
      type="module"
      src="/shared/xjk-core/sidenav-boot.js?v=2"
      data-xjk-sidenav="altered"
      data-xjk-page="bannerbuilder"
    ></script>
    <script
      type="module"
      src="/shared/xjk-core/topbar-loader.js?v=2"
      data-xjk-topbar="altered"
      data-xjk-page="bannerbuilder"
    ></script>
  </body>
</html>
