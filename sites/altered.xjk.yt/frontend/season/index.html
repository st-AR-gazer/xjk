<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>xjk / altered / season</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/altered-hub.css" />
  <link rel="stylesheet" href="season.css" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
</head>
<body>
  <a class="corner-login" href="/admin-login/">Login</a>

  <div class="backdrop" aria-hidden="true">
    <div class="geo-mesh"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="solids-layer" aria-hidden="true">
    <img class="solid solid-1" src="/bannerbuilder/assets/solids/Dodecahedron.png" alt="" />
    <img class="solid solid-2" src="/bannerbuilder/assets/solids/Icosahedron.png" alt="" />
    <img class="solid solid-3" src="/bannerbuilder/assets/solids/Octahedron.png" alt="" />
  </div>

  <main class="season-shell">
    <a class="back-link" href="/">&larr; Back to Hub</a>

    <!-- Season Hero -->
    <header class="season-hero" id="season-hero">
      <img class="season-hero-bg" id="season-hero-bg" src="" alt="" />
      <div class="season-hero-overlay"></div>
      <div class="season-hero-content">
        <span class="season-badge" id="season-badge">Season</span>
        <h1 class="season-title" id="season-title">Loading&hellip;</h1>
        <p class="season-sub" id="season-sub">Campaigns and maps for this season.</p>
      </div>
    </header>

    <!-- Stats -->
    <section class="stats-row" aria-label="Season stats">
      <div class="stat">
        <span class="stat-value" id="stat-campaigns">&mdash;</span>
        <span class="stat-label">Campaigns</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="stat-maps">&mdash;</span>
        <span class="stat-label">Maps</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="stat-tracked">&mdash;</span>
        <span class="stat-label">Tracked</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="stat-changes">&mdash;</span>
        <span class="stat-label">WR Changes</span>
      </div>
    </section>

    <!-- Search -->
    <div class="controls-bar">
      <input type="search" id="map-search" class="search-input" placeholder="Search maps, authors, WR holders&hellip;" />
      <select id="map-sort" class="sort-select">
        <option value="name">Sort: Name</option>
        <option value="wr_ms">Sort: WR Time</option>
        <option value="author_time">Sort: Author Time</option>
        <option value="wr_updated_at">Sort: Latest WR</option>
        <option value="change_count">Sort: Most Changes</option>
      </select>
    </div>

    <!-- Campaign sections rendered by JS -->
    <div id="campaigns-container"></div>

    <!-- States -->
    <div class="state-msg" id="loading-state">
      <p>Loading season data&hellip;</p>
    </div>
    <div class="state-msg" id="empty-state" hidden>
      <p>No campaigns found for this season.</p>
    </div>
    <div class="state-msg" id="error-state" hidden>
      <p>Could not reach the API &mdash; the backend may not be running yet.</p>
    </div>

    <!-- Footer -->
    <footer class="foot">
      <span class="foot-mark">altered.xjk.yt</span>
      <nav aria-label="Hub navigation">
        <a data-link="main" href="https://xjk.yt/">Main</a>
        <a data-link="tools" href="https://tools.xjk.yt/">Tools</a>
        <a data-link="plugins" href="https://plugins.xjk.yt/">Plugins</a>
        <a data-link="learn" href="https://learn.xjk.yt/">Learn</a>
        <a data-link="tracker" href="https://trackers.xjk.yt/leaderboard/">Tracker</a>
      </nav>
    </footer>
  </main>

  <script src="/altered-hub.js"></script>
  <script src="season.js"></script>
</body>
</html>
