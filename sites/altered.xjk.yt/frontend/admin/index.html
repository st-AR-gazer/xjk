<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="/shared/xjk-core/chrome-prepaint.css?v=2" data-xjk-chrome-prepaint />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>xjk / altered / admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Manrope:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../hub-styles/foundation.css?v=2" />
    <link rel="stylesheet" href="../hub-styles/overview.css?v=2" />
    <link rel="stylesheet" href="../hub-styles/activity.css?v=2" />
    <link rel="stylesheet" href="../hub-styles/responsive.css?v=2" />
    <link rel="stylesheet" href="../hub-styles/subpages.css?v=2" />
    <link rel="stylesheet" href="./styles/foundation.css?v=2" />
    <link rel="stylesheet" href="./styles/dashboard.css?v=2" />
    <link rel="stylesheet" href="./styles/naming-workspace.css?v=2" />
    <link rel="stylesheet" href="./styles/naming-table.css?v=2" />
    <link rel="stylesheet" href="./styles/naming-weights.css?v=2" />
    <link rel="stylesheet" href="./styles/overlays.css?v=2" />
    <link rel="icon" href="../favicon.svg?v=2" type="image/svg+xml" />
  </head>
  <body class="admin-v2-page">
    <div class="backdrop" aria-hidden="true">
      <div class="geo-mesh"></div>
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>

    <main class="admin-shell">
      <aside class="sidebar panel">
        <div class="sidebar-brand">
          <span class="brand-tag">Altered Hub</span>
          <h1>Admin</h1>
        </div>

        <nav class="sidebar-nav" aria-label="Admin navigation">
          <button class="nav-item" type="button" data-workspace-link="dashboard">
            <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor">
              <path
                d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"
              />
            </svg>
            <span>Dashboard</span>
          </button>
          <button class="nav-item" type="button" data-workspace-link="clubs">
            <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor">
              <path
                d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v3h8v-3zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-3a5.97 5.97 0 00-.75-2.906A3.005 3.005 0 0119 15v3h-3zM4.75 12.094A5.97 5.97 0 004 15v3H1v-3a3 3 0 013.75-2.906z"
              />
            </svg>
            <span>Clubs</span>
            <span id="navClubCount" class="nav-badge" hidden></span>
          </button>
          <button class="nav-item" type="button" data-workspace-link="maps">
            <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor">
              <path
                fill-rule="evenodd"
                d="M12 1.586l-4 4v12.828l4-4V1.586zM3.707 3.293A1 1 0 002 4v10a1 1 0 00.293.707L6 18.414V5.586L3.707 3.293zM17.707 5.293L14 1.586v12.828l2.293 2.293A1 1 0 0018 16V6a1 1 0 00-.293-.707z"
                clip-rule="evenodd"
              />
            </svg>
            <span>Maps</span>
          </button>
          <button class="nav-item" type="button" data-workspace-link="jobs">
            <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor">
              <path
                fill-rule="evenodd"
                d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z"
                clip-rule="evenodd"
              />
            </svg>
            <span>Jobs</span>
            <span id="navJobsRunning" class="nav-badge tone-running" hidden></span>
          </button>
          <button class="nav-item" type="button" data-workspace-link="activity">
            <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor">
              <path
                fill-rule="evenodd"
                d="M3 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z"
                clip-rule="evenodd"
              />
            </svg>
            <span>Activity</span>
          </button>
          <button class="nav-item" type="button" data-workspace-link="api">
            <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor">
              <path
                fill-rule="evenodd"
                d="M4 4a2 2 0 012-2h8a2 2 0 012 2v3a2 2 0 01-2 2h-1v2h1a2 2 0 012 2v3a2 2 0 01-2 2H6a2 2 0 01-2-2v-3a2 2 0 012-2h1V9H6a2 2 0 01-2-2V4zm2 1v2h8V5H6zm0 8v2h8v-2H6zm3-4v2h2V9H9z"
                clip-rule="evenodd"
              />
            </svg>
            <span>API</span>
          </button>
          <button class="nav-item" type="button" data-workspace-link="settings">
            <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor">
              <path
                fill-rule="evenodd"
                d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z"
                clip-rule="evenodd"
              />
            </svg>
            <span>Settings</span>
          </button>
        </nav>

        <div class="sidebar-footer">
          <div id="sidebarSession" class="session-block">Checking session...</div>
          <button id="logoutBtn" class="nav-action" type="button">Log Out</button>
        </div>
      </aside>

      <section class="main-area">
        <header class="topbar panel">
          <div class="topbar-left">
            <span id="healthPill" class="pill tone-muted">Loading</span>
            <h2 id="healthSummary" class="topbar-title">Loading admin...</h2>
          </div>
          <div class="topbar-stats">
            <div class="topbar-stat">
              <span class="topbar-stat-label">User</span>
              <strong id="statUser">-</strong>
            </div>
            <div class="topbar-stat">
              <span class="topbar-stat-label">Running</span>
              <strong id="statRunning">0</strong>
            </div>
            <div class="topbar-stat">
              <span class="topbar-stat-label">Alerts</span>
              <strong id="statAlerts">0</strong>
            </div>
            <div class="topbar-stat">
              <span class="topbar-stat-label">Updated</span>
              <strong id="statUpdated">-</strong>
            </div>
          </div>
        </header>
        <div class="workspace-container">
          <section class="workspace active" data-workspace="dashboard">
            <div class="workspace-header">
              <div>
                <p class="ws-label">Dashboard</p>
                <h2>Overview</h2>
              </div>
              <div class="ws-actions">
                <button class="btn outline" type="button" data-refresh="dashboard">Refresh</button>
              </div>
            </div>
            <div id="wsDashboard"></div>
          </section>

          <section class="workspace" data-workspace="clubs" hidden>
            <div class="workspace-header">
              <div>
                <p class="ws-label">Clubs</p>
                <h2>Manage clubs</h2>
              </div>
              <div class="ws-actions">
                <button class="btn outline" type="button" data-refresh="clubs">Refresh</button>
              </div>
            </div>
            <div id="wsClubs"></div>
          </section>

          <section class="workspace" data-workspace="maps" hidden>
            <div class="workspace-header">
              <div>
                <p class="ws-label">Maps</p>
                <h2>Map workspace</h2>
              </div>
              <div class="ws-actions">
                <button class="btn outline" type="button" data-refresh="maps">Refresh</button>
              </div>
            </div>
            <div id="wsMaps"></div>
          </section>

          <section class="workspace" data-workspace="jobs" hidden>
            <div class="workspace-header">
              <div>
                <p class="ws-label">Jobs</p>
                <h2>Sync jobs</h2>
              </div>
              <div class="ws-actions">
                <button class="btn outline" type="button" data-refresh="jobs">Refresh</button>
              </div>
            </div>
            <div id="wsJobs"></div>
          </section>

          <section class="workspace" data-workspace="activity" hidden>
            <div class="workspace-header">
              <div>
                <p class="ws-label">Activity</p>
                <h2>Event feed</h2>
              </div>
              <div class="ws-actions">
                <button class="btn outline" type="button" data-refresh="activity">Refresh</button>
              </div>
            </div>
            <div id="wsActivity"></div>
          </section>

          <section class="workspace" data-workspace="api" hidden>
            <div class="workspace-header">
              <div>
                <p class="ws-label">API</p>
                <h2>Public API</h2>
              </div>
              <div class="ws-actions">
                <button class="btn outline" type="button" data-refresh="api">Refresh</button>
              </div>
            </div>
            <div id="wsApi"></div>
          </section>

          <section class="workspace" data-workspace="settings" hidden>
            <div class="workspace-header">
              <div>
                <p class="ws-label">Settings</p>
                <h2>Configuration</h2>
              </div>
              <div class="ws-actions">
                <button class="btn outline" type="button" data-refresh="settings">Refresh</button>
              </div>
            </div>
            <div id="wsSettings"></div>
          </section>
        </div>
      </section>

      <div id="drawerScrim" class="drawer-scrim" hidden></div>
      <aside id="detailDrawer" class="drawer panel" hidden aria-hidden="true">
        <div
          id="drawerResizeHandle"
          class="drawer-resize-handle"
          role="separator"
          aria-orientation="vertical"
          aria-label="Resize details panel"
        ></div>
        <div class="drawer-header">
          <div>
            <p id="drawerKicker" class="ws-label">Detail</p>
            <h2 id="drawerTitle">Detail</h2>
            <p id="drawerSubtitle" class="drawer-sub"></p>
          </div>
          <button id="drawerCloseBtn" class="btn ghost close-btn" type="button" aria-label="Close">Close</button>
        </div>
        <div id="drawerBody" class="drawer-body"></div>
      </aside>
    </main>

    <div id="toastContainer" class="toast-container" aria-live="polite"></div>

    <script src="/shared/xjk-core/local-path-rewriter.js?v=2"></script>
    <script src="../altered-paths.js?v=2"></script>
    <script src="./admin-v2.js?v=2" type="module"></script>
    <script
      type="module"
      src="/shared/xjk-core/sidenav-boot.js?v=2"
      data-xjk-sidenav="altered"
      data-xjk-page="admin"
    ></script>
    <script
      type="module"
      src="/shared/xjk-core/topbar-loader.js?v=2"
      data-xjk-topbar="altered"
      data-xjk-page="admin"
    ></script>
  </body>
</html>
