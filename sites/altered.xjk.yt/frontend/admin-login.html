<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>xjk / altered / admin login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/altered-hub.css" />
  <link rel="stylesheet" href="/admin-login.css" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
</head>
<body>
  <div class="backdrop" aria-hidden="true">
    <div class="geo-mesh"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="solids-layer" aria-hidden="true">
    <img class="solid solid-1" src="/bannerbuilder/assets/solids/Dodecahedron.png" alt="" />
    <img class="solid solid-2" src="/bannerbuilder/assets/solids/Icosahedron.png" alt="" />
    <img class="solid solid-3" src="/bannerbuilder/assets/solids/Octahedron.png" alt="" />
  </div>

  <a class="corner-login" href="/">Back</a>

  <main class="shell login-shell">
    <section class="hero panel login-card">
      <div class="hero-top">
        <span class="tag">Admin Access</span>
        <span class="login-chip">Allowlisted Ubisoft Accounts</span>
      </div>
      <h1>Sign In To Altered Admin</h1>
      <p class="login-copy">
        Use your approved Ubisoft account to access the admin dashboard.
      </p>
      <div id="loginState" class="login-status login-status-loading" role="status" aria-live="polite">
        Checking login status...
      </div>
      <div class="cta-row login-actions">
        <a id="loginButton" class="btn btn-primary" href="/auth/ubisoft/login?return_to=%2Fadmin%2F">Continue with Ubisoft</a>
        <a class="btn btn-secondary" href="/admin/">Open Admin</a>
      </div>
      <p class="login-footnote">
        Approved accounts continue straight into the admin dashboard after callback.
      </p>
    </section>
  </main>

  <script src="/altered-hub.js"></script>
  <script src="/admin-login.js"></script>
</body>
</html>
