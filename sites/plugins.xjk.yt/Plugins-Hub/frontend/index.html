<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="/shared/xjk-core/chrome-prepaint.css?v=2" data-xjk-chrome-prepaint />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>plugins.xjk.yt</title>
    <meta name="description" content="Openplanet plugins by xjk for Trackmania." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Condensed:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/shared/xjk-core/surface-foundation.css?v=2" />
    <link rel="stylesheet" href="styles.css?v=2" />
    <link rel="icon" href="./favicon.svg?v=2" type="image/svg+xml" />
  </head>
  <body>
    <div class="backdrop" aria-hidden="true"></div>

    <header class="plg-topbar"></header>

    <main class="plg-main">
      <section class="plg-hero" aria-labelledby="plgTitle">
        <div class="hero-copy">
          <h1 id="plgTitle"><span class="hero-accent">plugins</span>.xjk.yt</h1>
          <p>my Openplanet plugins</p>
        </div>
      </section>

      <div class="plg-search-row">
        <label class="sr-only" for="pluginSearch">Search plugins</label>
        <div class="plg-search">
          <span class="search-glyph" aria-hidden="true"></span>
          <input id="pluginSearch" type="search" placeholder="Search plugins..." autocomplete="off" />
          <kbd>/</kbd>
        </div>

        <div class="plg-info" aria-label="Plugin source">
          <span class="plg-info-item plg-info-item--source" id="sourceState">
            <span class="plg-op-badge" aria-hidden="true">op</span>
            Live from Openplanet
          </span>
          <span class="plg-info-sep" aria-hidden="true"></span>
          <span class="plg-info-item"><strong id="statTotal">0</strong> plugins</span>
          <span class="plg-info-sep" aria-hidden="true"></span>
          <span class="plg-info-item"
            >profile: <a class="plg-info-link" id="profileLink" href="#" rel="noopener">&mdash;</a></span
          >
        </div>
      </div>

      <section class="plg-catalog" aria-live="polite">
        <div id="toolGrid" class="plugins-grid"></div>
      </section>

      <footer class="foot">
        <span class="foot-mark">plugins.xjk.yt</span>
        <p class="foot-note">
          All plugins are free to use. Made and maintained by xjk.
          <span class="foot-sep" aria-hidden="true">&middot;</span>
          Source: <a class="foot-link" id="footProfileLink" href="#" rel="noopener">Openplanet profile</a>
        </p>
      </footer>
    </main>

    <script type="module" src="app.js?v=2"></script>
    <script type="module" src="/shared/xjk-core/sidenav-boot.js?v=2" data-xjk-sidenav="plugins"></script>
    <script type="module" src="/shared/xjk-core/topbar-loader.js?v=2" data-xjk-topbar="plugins"></script>
  </body>
</html>
